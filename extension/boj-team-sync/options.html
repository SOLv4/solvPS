<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOJ Team Sync 설정</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; }
      h1 { margin: 0 0 16px; }
      .field { margin-bottom: 12px; }
      label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
      input { width: 100%; box-sizing: border-box; border: 1px solid #cfd9f3; border-radius: 8px; padding: 10px 12px; font-size: 14px; }
      button { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 600; background: #0f46d8; color: white; cursor: pointer; }
      .muted { color: #64748b; font-size: 13px; }
      #status { margin-left: 8px; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>BOJ Team Sync 설정</h1>
    <p class="muted">백준 정답 제출을 팀 플랫폼 API로 업로드하기 위한 설정입니다.</p>

    <div class="field">
      <label for="apiBaseUrl">API Base URL</label>
      <input id="apiBaseUrl" placeholder="예: http://localhost:3000" />
    </div>
    <div class="field">
      <label for="apiToken">API Token (Bearer)</label>
      <input id="apiToken" placeholder="예: eyJ..." />
    </div>
    <div class="field">
      <label for="teamId">Team ID</label>
      <input id="teamId" placeholder="예: team-1" />
    </div>
    <div class="field">
      <label for="memberHandle">Member Handle (BOJ 핸들)</label>
      <input id="memberHandle" placeholder="예: han97901" />
    </div>

    <button id="saveBtn">저장</button><span id="status"></span>
    <script src="options.js"></script>
  </body>
  </html>
